<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic & Problem-Solving Evaluation</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/styles.css">
        
    
</head>
<body>

<div id="quiz-container">
    <header class="quiz-header">
        <span class="eyebrow">Logic & Problem-Solving Evaluation</span>
        <p>Enter your name and school first, then complete the test. Results are shown after you finish.</p>
    </header>

    <div id="quiz-content">
        <section id="quiz-card">
            <div class="card-body">
                <div class="card-top">
                    <div class="card-title-row">
                        <span class="card-title">Question</span>
                        <p id="progress"></p>
                    </div>
                    <h2 id="question-text">Question Loading...</h2>
                </div>

                <div id="options-panel">
                    <h3>Pick an answer</h3>
                    <div id="options-container"></div>

                    <div id="explanation-panel">
                        <label for="explanation-input">Explain your choice</label>
                        <textarea id="explanation-input" rows="4" placeholder="Describe why you selected this answer."></textarea>
                        <p id="explanation-note">Your explanation is required before moving on.</p>
                    </div>
                </div>

                <button id="next-btn" disabled>Next Question</button>
            </div>
        </section>
    </div>

    <section id="result-screen" class="hidden">
        <h2>Evaluation Complete</h2>
        <p id="result-summary"></p>
        <p id="score-text"></p>
        <button id="restart-btn">Restart Quiz</button>
    </section>
</div>

<script>
    // 1. State Management
    let quizData = [];
    let currentQuestion = 0;
    let selectedIndex = null;
    let userInfo = null;

    // 2. Element Selectors
    const questionEl = document.getElementById('question-text');
    const optionsEl = document.getElementById('options-container');
    const progressEl = document.getElementById('progress');
    const nextBtn = document.getElementById('next-btn');
    const explanationInput = document.getElementById('explanation-input');
    const explanationNote = document.getElementById('explanation-note');
    const resultSummary = document.getElementById('result-summary');

    function updateNextButtonState() {
        const explanationValid = explanationInput.value.trim().length > 0;
        nextBtn.disabled = selectedIndex === null || !explanationValid;
        explanationNote.style.opacity = explanationValid ? '0' : '1';
    }

    explanationInput.oninput = updateNextButtonState;

    // 3. Fetch Data from Python Backend
    async function initQuiz() {
        try {
            const [userResponse, questionResponse] = await Promise.all([
                fetch('/api/user'),
                fetch('/api/questions')
            ]);

            if (!userResponse.ok) {
                window.location.href = '/';
                return;
            }

            userInfo = await userResponse.json();
            quizData = await questionResponse.json();
            loadQuestion();
        } catch (err) {
            questionEl.innerText = "Error loading quiz data.";
            console.error(err);
        }
    }

    // Start the quiz automatically once the page loads
    initQuiz();

    // 4. Quiz Logic
    function loadQuestion() {
        const data = quizData[currentQuestion];
        selectedIndex = null;

        progressEl.innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;
        questionEl.innerText = data.q;
        optionsEl.innerHTML = '';

        if (data.explanation === undefined) {
            data.explanation = '';
        }
        explanationInput.value = data.explanation;
        nextBtn.disabled = true;
        nextBtn.innerText = currentQuestion < quizData.length - 1 ? 'Next Question' : 'Submit';
        updateNextButtonState();

        data.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt.text;
            btn.className = 'option-btn';
            btn.onclick = () => selectOption(index, btn);
            optionsEl.appendChild(btn);
        });

        requestAnimationFrame(() => {
            document.querySelectorAll('.option-btn').forEach((btn, index) => {
                setTimeout(() => btn.classList.add('visible'), 70 * index + 120);
            });
        });
    }

    function selectOption(index, btn) {
        selectedIndex = index;
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        updateNextButtonState();
    }

    nextBtn.onclick = () => {
        if (selectedIndex === null) return;

        quizData[currentQuestion].selected = selectedIndex;
        quizData[currentQuestion].explanation = explanationInput.value.trim();
        currentQuestion++;

        if (currentQuestion < quizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    };

    function showResults() {
        const score = quizData.reduce((total, item) => {
            return total + (item.options[item.selected]?.correct ? 1 : 0);
        }, 0);

        document.getElementById('quiz-content').classList.add('hidden');
        const resultScreen = document.getElementById('result-screen');
        resultScreen.classList.remove('hidden');
        resultSummary.innerText = userInfo ? `Name: ${userInfo.full_name} • School: ${userInfo.school_name} • Email: ${userInfo.email}` : '';
        document.getElementById('score-text').innerText = `You got ${score} out of ${quizData.length} correct.`;
        sendScoreToDatabase(score);
    }
    async function sendScoreToDatabase(totalScore) {
        try {
            const payload = {
                score: totalScore,
                responses: quizData.map((q, index) => ({
                    questionId: index + 1,
                    question: q.q,
                    selected: q.selected,
                    selectedText: q.options[q.selected]?.text || null,
                    explanation: q.explanation || '',
                    correct: q.options[q.selected]?.correct || false
                }))
            };

            const response = await fetch('/api/submit-score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                console.log("Score recorded in Supabase!");
            } else {
                console.error("Failed to save score.");
            }
        } catch (err) {
            console.error("Network error:", err);
        }
    }

    async function restartQuiz() {
        try {
            await fetch('/api/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
        } catch (err) {
            console.warn('Reset request failed, continuing to registration page.');
        }
        window.location.href = '/';
    }

    document.getElementById('restart-btn').onclick = restartQuiz;

    // Start with the user info form
</script>
</body>
</html>
